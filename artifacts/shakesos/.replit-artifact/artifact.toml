kind = "web"
previewPath = "/"
title = "ShakeSOS Emergency App"
version = "1.0.0"
id = "artifacts/shakesos"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21184

[services.development]
run = "pnpm --filter @workspace/shakesos run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/shakesos", "run", "build" ]
publicDir = "artifacts/shakesos/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21184"
BASE_PATH = "/"
